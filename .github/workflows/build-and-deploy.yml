name: Build and deploy

on:
  push:
    branches: [main]
  schedule:
    # Daily rebuild. Since each version is pinned to a spec-repo tag,
    # this is effectively a no-op unless the workflow or template
    # changes; the daily run serves as a passive correctness signal.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Versions to render. Add a new entry here when a new spec version
# is tagged in proof-of-insight/spec.
env:
  SPEC_VERSIONS: "v0.6.2 v0.7.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc and XeLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-extra \
            fonts-jetbrains-mono

      - name: Install Spectral font
        # Spectral isn't packaged for Debian/Ubuntu; pull the OFL TTFs from
        # the Google Fonts repo at a pinned commit so xelatex can resolve
        # `mainfont=Spectral` against the brand-correct face.
        run: |
          SPECTRAL_REF="main"
          BASE="https://raw.githubusercontent.com/google/fonts/${SPECTRAL_REF}/ofl/spectral"
          DEST=/usr/share/fonts/truetype/spectral
          sudo mkdir -p "${DEST}"
          for face in \
            Spectral-Regular.ttf \
            Spectral-Italic.ttf \
            Spectral-Medium.ttf \
            Spectral-MediumItalic.ttf \
            Spectral-Bold.ttf \
            Spectral-BoldItalic.ttf; do
            sudo curl -fsSL "${BASE}/${face}" -o "${DEST}/${face}"
          done
          sudo fc-cache -f
          fc-list | grep -i spectral | head -4

      - name: Render specifications
        run: |
          for v in ${SPEC_VERSIONS}; do
            echo "::group::Render ${v}"
            if [ -n "${SPEC_REF_OVERRIDE:-}" ]; then
              ./build/render-spec.sh "${v}" --ref "${SPEC_REF_OVERRIDE}"
            else
              ./build/render-spec.sh "${v}"
            fi
            echo "::endgroup::"
          done

      - name: Assemble site
        run: |
          mkdir -p dist
          cp index.html dist/
          cp CNAME dist/
          cp poi-favicon.svg poi-favicon-32.png dist/
          [ -d spec ] && cp -R spec dist/
          [ -d schema ] && cp -R schema dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
